<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Ninefold — explore nine philosophies on a sunlit island paradise." />
    <title>Ninefold</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a2a24;
        --sea: #2a6f6b;
        --sand: #f3e6c8;
        --sun: #e8b86d;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 20%, #3d8a84 0%, #1a3d3a 55%, #0e1f1d 100%);
        color: var(--sand);
        font-family: 'Source Sans 3', system-ui, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }
      #game-root {
        width: min(100vw, 960px);
        height: min(100vh, 720px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        border: 2px solid rgba(243, 230, 200, 0.25);
        border-radius: 6px;
        overflow: hidden;
        background: #0e1f1d;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
